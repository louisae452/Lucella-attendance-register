{% extends "base.html" %}
{% load static %}
{% load custom_tags %}

{% block content %}

{% if request.user|has_group:"teacher" %}

    <div class="form-container">
        
        <div class="reducesize">
            <h1> Parent's additional information</h1>
            <form method="post">

                {{ parentform }}
                {% csrf_token %}
                <button class="button" type="submit">Save data</button>
            </form>
        </div>

    </div>
{% else %}
<div>
    <a class="button" href="{% url 'landing' %}">Main menu</a>
</div>

{% endif %}


{% endblock %}
