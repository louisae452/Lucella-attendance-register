{% load static %}

<!DOCTYPE html>
<html class="h-100" lang="en">
<head>

    {% endblock %}
    <!-- Custom Css-->
     <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    
    <header>
        <div id="header">
            <img src="{% static 'images/logogreen.svg' %}" alt="Lucella High School logo" width="50" height="50">
            <h1>Lucella High school</h1> 
        </div>
    </header>
    <main>
        {% block content %}   
        <div>
            <h2> {{ studentname}} {{studentsurname}},</h2>
            {{ text | safe}}
        </div>
        {% endblock %}
    </main>
    <footer>
        <a href="mailto:lucellahighschool@gmail.com"> lucellahighschool@gmail.com</a>
    </footer>
</body>
</html>
